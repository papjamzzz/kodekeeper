<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kode Keeper</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0f14;
  --surface:  #111318;
  --border:   #1e2230;
  --green:    #58DE83;
  --green2:   #69F09B;
  --green-dim:#1a4028;
  --amber:    #DA8E20;
  --amber-dim:#5a3a08;
  --red:      #CD4E14;
  --red-dim:  #5a1f08;
  --text:     #c8cfe0;
  --dim:      #4a5270;
  --muted:    #252838;
  --purple:   #9d7fff;
  --mono:     'JetBrains Mono', monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Subtle scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ── Layout ── */
.terminal {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Row / block ── */
.t-block {
  border: 1px solid var(--border);
  border-bottom: none;
}
.t-block:first-child  { border-radius: 6px 6px 0 0; }
.t-block:last-child   { border-bottom: 1px solid var(--border); border-radius: 0 0 6px 6px; }
.t-block:only-child   { border-radius: 6px; border-bottom: 1px solid var(--border); }

.t-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}

.t-header .label { color: var(--green); }
.t-header .spacer { flex: 1; }

.t-body {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Nameplate row ── */
.nameplate {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 10px;
}

.np-logo {
  width: 36px; height: 36px;
  border-radius: 6px;
  margin-right: 14px;
  flex-shrink: 0;
}

.np-brand {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.np-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
}

.np-sub {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
}

.np-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 24px;
}

.np-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}

.np-stat .val { font-size: 13px; font-weight: 600; color: var(--text); }
.np-stat .lbl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); }

.np-sep { width: 1px; height: 24px; background: var(--border); }

/* ── Main status row ── */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  flex-wrap: wrap;
}

.pipe { color: var(--border); margin: 0 4px; user-select: none; }

/* Health indicator */
.health {
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
}
.health.ok     { color: var(--green);  background: var(--green-dim); }
.health.watch  { color: var(--amber);  background: var(--amber-dim); }
.health.warn   { color: var(--amber);  background: var(--amber-dim); }
.health.danger { color: var(--red);    background: var(--red-dim); }

/* ASCII bar */
.ascii-bar { color: var(--green); letter-spacing: -1px; font-weight: 500; }
.ascii-bar.warn   { color: var(--amber); }
.ascii-bar.danger { color: var(--red); }

.pct { font-weight: 600; }
.pct.ok     { color: var(--green); }
.pct.watch  { color: var(--amber); }
.pct.warn   { color: var(--amber); }
.pct.danger { color: var(--red); }

/* Power toggle */
.power-toggle {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  transition: border-color 0.2s;
  user-select: none;
  margin-left: auto;
}
.power-toggle:hover { border-color: var(--amber); }
.power-led {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--amber-dim);
  transition: all 0.3s;
}
.power-led.on { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.power-label { font-size: 10px; letter-spacing: 1.5px; color: var(--dim); }

/* ── Data rows ── */
.data-row {
  display: flex;
  align-items: baseline;
  gap: 0;
  font-size: 13px;
  line-height: 1.8;
}

.row-key {
  color: var(--dim);
  width: 110px;
  flex-shrink: 0;
  font-size: 11px;
  letter-spacing: 1px;
}

.row-val {
  color: var(--text);
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}

.val-grp {
  display: flex; align-items: baseline; gap: 6px;
}

.tag {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
  margin-right: 2px;
}

.num { font-weight: 600; color: var(--text); }
.num.green  { color: var(--green); }
.num.amber  { color: var(--amber); }
.num.purple { color: var(--purple); }

/* ── Project list ── */
.proj-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px solid var(--muted);
}
.proj-row:last-child { border-bottom: none; }

.proj-led {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.proj-led.on  { background: var(--green);  box-shadow: 0 0 5px var(--green); }
.proj-led.off { background: var(--dim); }

.proj-name  { width: 130px; flex-shrink: 0; font-weight: 600; }
.proj-port  { width: 60px;  flex-shrink: 0; color: var(--dim); }
.proj-branch{ width: 100px; flex-shrink: 0; color: var(--purple); }
.proj-clean { width: 70px;  flex-shrink: 0; }
.proj-status{ margin-left: auto; font-size: 11px; letter-spacing: 1px; }

.proj-status.online  { color: var(--green); }
.proj-status.offline { color: var(--dim); }

/* ── Git rows ── */
.git-row {
  display: grid;
  grid-template-columns: 140px 100px 80px 120px 1fr;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px solid var(--muted);
}
.git-row:last-child { border-bottom: none; }

.git-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 6px; }
.git-dot.clean { background: var(--green); box-shadow: 0 0 5px var(--green); }
.git-dot.dirty { background: var(--amber); box-shadow: 0 0 5px var(--amber); }

.git-name   { font-weight: 600; }
.git-branch { color: var(--purple); }
.git-state  { }
.git-state.clean { color: var(--green); }
.git-state.dirty { color: var(--amber); }
.git-last   { color: var(--dim); font-size: 11px; }

/* ── Cursor blink ── */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor { display: inline-block; width: 8px; height: 13px; background: var(--green); animation: blink 1.2s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 10px; height: 10px; border: 1px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>
<div class="terminal">

  <!-- ── Nameplate ── -->
  <div class="nameplate">
    <img src="/static/logo.png" alt="Kode Keeper" class="np-logo"
         onerror="this.style.display='none'">
    <div class="np-brand">
      <span class="np-name">Kode Keeper</span>
      <span class="np-sub">Claude Code Mission Control &nbsp;·&nbsp; Creative Konsoles</span>
    </div>
    <div class="np-right">
      <div class="np-stat">
        <span class="val" id="npModel">—</span>
        <span class="lbl">Model</span>
      </div>
      <div class="np-sep"></div>
      <div class="np-stat">
        <span class="val" id="npSession">—</span>
        <span class="lbl">Session</span>
      </div>
      <div class="np-sep"></div>
      <div class="np-stat">
        <span class="val" id="npTime" style="color:var(--dim);font-size:15px">—</span>
        <span class="lbl">Time</span>
      </div>
    </div>
  </div>

  <!-- ── Context / Status ── -->
  <div class="t-block">
    <div class="t-header">
      <span class="label">Context</span>
      <span class="spacer"></span>
      <div class="power-toggle" id="powerBtn" onclick="toggleAutoOpen()">
        <div class="power-led" id="powerLed"></div>
        <span class="power-label" id="powerLabel">AUTO-OPEN</span>
      </div>
    </div>
    <div class="t-body">
      <div class="status-row">
        <span class="health ok" id="ctxHealth">OK</span>
        <span class="ascii-bar" id="ctxBar">░░░░░░░░░░</span>
        <span class="pct ok" id="ctxPct">—%</span>
        <span class="pipe">|</span>
        <span id="ctxFree" style="color:var(--dim)">— free</span>
        <span class="pipe">|</span>
        <span id="ctxModel2" style="color:var(--dim)">—</span>
        <span class="cursor"></span>
      </div>
    </div>
  </div>

  <!-- ── Usage & Cost ── -->
  <div class="t-block">
    <div class="t-header">
      <span class="label">Usage</span>
    </div>
    <div class="t-body">
      <div class="data-row">
        <span class="row-key">Tokens</span>
        <div class="row-val">
          <div class="val-grp"><span class="tag">day</span><span class="num green" id="tokDay">—</span></div>
          <span class="pipe">|</span>
          <div class="val-grp"><span class="tag">week</span><span class="num purple" id="tokWk">—</span></div>
          <span class="pipe">|</span>
          <div class="val-grp"><span class="tag">month</span><span class="num amber" id="tokMo">—</span></div>
        </div>
      </div>
      <div class="data-row">
        <span class="row-key">Est. Cost</span>
        <div class="row-val">
          <div class="val-grp"><span class="tag">day</span><span class="num green" id="costDay">—</span></div>
          <span class="pipe">|</span>
          <div class="val-grp"><span class="tag">week</span><span class="num purple" id="costWk">—</span></div>
          <span class="pipe">|</span>
          <div class="val-grp"><span class="tag">month</span><span class="num amber" id="costMo">—</span></div>
          <span class="pipe">|</span>
          <span style="color:var(--dim);font-size:11px">Sonnet 4.6 · $3/M in · $15/M out</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Projects ── -->
  <div class="t-block">
    <div class="t-header">
      <span class="label">Projects</span>
      <span id="onlineCount" style="color:var(--dim);margin-left:8px">—</span>
    </div>
    <div class="t-body" id="projectList">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ── Git ── -->
  <div class="t-block">
    <div class="t-header">
      <span class="label">Git</span>
    </div>
    <div class="t-body" id="gitList">
      <div class="spinner"></div>
    </div>
  </div>

</div><!-- /terminal -->

<script>
// ── Utilities ──────────────────────────────────────────────────────────────────

const fmtK = n => {
  n = parseInt(n) || 0;
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+'M';
  if (n >= 1_000) return Math.round(n/1_000)+'k';
  return String(n);
};

const fmtCost = v => {
  const n = parseFloat(v)||0;
  if (n===0) return '$0.00';
  if (n<0.01) return '<$0.01';
  return '$'+n.toFixed(2);
};

const fmtMins = m => {
  if (!m && m!==0) return '—';
  if (m<60) return m+'m';
  const h=Math.floor(m/60), r=m%60;
  return h+'h'+(r>0?' '+r+'m':'');
};

// ── ASCII bar ──────────────────────────────────────────────────────────────────

function asciiBar(pct) {
  const filled = Math.round(pct/10);
  return '█'.repeat(Math.min(filled,10)) + '░'.repeat(Math.max(10-filled,0));
}

// ── Context health ─────────────────────────────────────────────────────────────

function healthClass(pct) {
  if (pct>=85) return 'danger';
  if (pct>=70) return 'warn';
  if (pct>=50) return 'watch';
  return 'ok';
}

function healthLabel(pct) {
  if (pct>=85) return '!! RESET NOW';
  if (pct>=70) return '!! FILLING';
  if (pct>=50) return '>';
  return 'OK';
}

// ── Power button ───────────────────────────────────────────────────────────────

let autoOpen = true;

function toggleAutoOpen() {
  autoOpen = !autoOpen;
  document.getElementById('powerLed').classList.toggle('on', autoOpen);
  fetch('/api/settings', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({auto_open: autoOpen})
  });
}

// ── Render projects ────────────────────────────────────────────────────────────

function renderProjects(projects) {
  const online = projects.filter(p=>p.online).length;
  document.getElementById('onlineCount').textContent = online + ' online / ' + projects.length + ' total';

  document.getElementById('projectList').innerHTML = projects.map(p => {
    const g = p.git;
    const branchStr = g ? `⎇ ${g.branch}` : '—';
    const cleanStr  = g ? (g.clean ? '<span style="color:var(--green)">✓ clean</span>' : '<span style="color:var(--amber)">● dirty</span>') : '<span style="color:var(--dim)">—</span>';
    const href = p.online ? `http://localhost:${p.port}` : '#';
    const onClick = p.online ? '' : 'onclick="return false"';
    return `
      <div class="proj-row">
        <div class="proj-led ${p.online?'on':'off'}"></div>
        <span class="proj-name">${p.name}</span>
        <span class="proj-port">:${p.port}</span>
        <span class="proj-branch">${branchStr}</span>
        <span class="proj-clean">${cleanStr}</span>
        <span class="proj-status ${p.online?'online':'offline'}">${p.online?'● ONLINE':'○ offline'}</span>
        ${p.online ? `<a href="${href}" target="_blank" style="margin-left:12px;color:var(--dim);font-size:10px;text-decoration:none;letter-spacing:1px">OPEN →</a>` : ''}
      </div>`;
  }).join('');
}

// ── Render git ─────────────────────────────────────────────────────────────────

function renderGit(projects) {
  const withGit = projects.filter(p=>p.git);
  if (!withGit.length) {
    document.getElementById('gitList').innerHTML = '<span style="color:var(--dim)">no repos found</span>';
    return;
  }
  document.getElementById('gitList').innerHTML = withGit.map(p => {
    const g = p.git;
    const cls = g.clean ? 'clean' : 'dirty';
    const stateTxt = g.clean ? '✓ clean' : '● uncommitted';
    return `
      <div class="git-row">
        <span class="git-name"><span class="git-dot ${cls}"></span>${p.name}</span>
        <span class="git-branch">⎇ ${g.branch}</span>
        <span class="git-state ${cls}">${stateTxt}</span>
        <span class="git-last">${g.last_commit}</span>
      </div>`;
  }).join('');
}

// ── Main update ────────────────────────────────────────────────────────────────

async function update() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();

    // Nameplate
    document.getElementById('npModel').textContent   = d.context.model || '—';
    document.getElementById('npSession').textContent = fmtMins(d.session_mins);
    document.getElementById('npTime').textContent    = d.now;

    autoOpen = d.settings.auto_open;
    document.getElementById('powerLed').classList.toggle('on', autoOpen);

    // Context bar
    const pct = d.context.pct || 0;
    const hCls = healthClass(pct);
    const hEl  = document.getElementById('ctxHealth');
    hEl.textContent = healthLabel(pct);
    hEl.className   = 'health '+hCls;

    const barEl = document.getElementById('ctxBar');
    barEl.textContent = asciiBar(pct);
    barEl.className   = 'ascii-bar '+hCls;

    const pctEl = document.getElementById('ctxPct');
    pctEl.textContent = pct.toFixed(0)+'%';
    pctEl.className   = 'pct '+hCls;

    document.getElementById('ctxFree').textContent   = (d.context.free_k||'—')+' free';
    document.getElementById('ctxModel2').textContent = d.context.model||'—';

    // Usage
    document.getElementById('tokDay').textContent  = fmtK(d.usage.day.tokens);
    document.getElementById('tokWk').textContent   = fmtK(d.usage.week.tokens);
    document.getElementById('tokMo').textContent   = fmtK(d.usage.month.tokens);
    document.getElementById('costDay').textContent = fmtCost(d.usage.day.cost);
    document.getElementById('costWk').textContent  = fmtCost(d.usage.week.cost);
    document.getElementById('costMo').textContent  = fmtCost(d.usage.month.cost);

    // Projects + git
    if (d.projects) {
      renderProjects(d.projects);
      renderGit(d.projects);
    }

  } catch(e) { console.warn('update failed', e); }
}

function tickClock() {
  const t = new Date();
  document.getElementById('npTime').textContent =
    String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
}

update();
setInterval(update, 6000);
setInterval(tickClock, 1000);
</script>
</body>
</html>
