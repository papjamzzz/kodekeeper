<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kode Keeper — Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── CSS Variables (8px grid, semantic colors) ── */
    :root {
      /* Spacing (8px grid) */
      --space-0: 0px;
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
      --space-4: 32px;
      --space-5: 40px;

      /* Colors (Light theme) */
      --bg-primary: #f8f7f5;
      --bg-secondary: #efefeb;
      --bg-tertiary: #e8e5df;

      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;

      --border-color: #ddd9d0;
      --border-light: #eae7e0;

      /* Semantic colors */
      --color-success: #00a651;    /* Green */
      --color-warning: #ff8c3a;    /* Orange */
      --color-error: #ff5c38;      /* Red */
      --color-info: #0066cc;       /* Blue */

      /* Fonts */
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* Effects */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    /* ── Dark theme ── */
    [data-theme="dark"] {
      --bg-primary: #14162a;
      --bg-secondary: #1c1f3a;
      --bg-tertiary: #222545;
      --text-primary: #f0f4ff;
      --text-secondary: #b0bcda;
      --text-tertiary: #6878a0;
      --border-color: #3a3f68;
      --border-light: #2a2d50;
      --color-success: #00e8ff;
      --color-warning: #dd55ff;
      --color-error: #ff6040;
      --color-info: #00e8ff;
      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;
    }

    html, body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout: Sidebar + Main ── */
    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar (Collapsible) ── */
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      overflow: hidden;
      position: relative;
      z-index: 100;
    }

    .sidebar.collapsed {
      width: 64px;
    }

    .sidebar-header {
      padding: var(--space-2);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .sidebar-logo {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--color-warning), var(--color-error));
      flex-shrink: 0;
    }

    .sidebar.collapsed .sidebar-logo {
      width: 40px;
      height: 40px;
      margin: 0 auto;
    }

    .sidebar-title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-left: var(--space-2);
      white-space: nowrap;
    }

    .sidebar.collapsed .sidebar-title {
      display: none;
    }

    .sidebar-collapse-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .sidebar-collapse-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      overflow-y: auto;
    }

    .nav-item {
      padding: var(--space-2);
      border-radius: 6px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--color-warning);
      color: white;
    }

    .sidebar.collapsed .nav-item {
      padding: var(--space-1);
      font-size: 0;
    }

    .nav-item::before {
      content: attr(data-icon);
      display: inline-block;
      margin-right: var(--space-2);
    }

    .sidebar.collapsed .nav-item::before {
      margin-right: 0;
      font-size: 16px;
    }

    /* ── Sidebar Hover Overlay (Collapsed) ── */
    .sidebar-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: var(--space-2);
      box-shadow: var(--shadow-lg);
      pointer-events: none;
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
      margin-top: 80px;
      margin-left: 64px;
    }

    .sidebar.collapsed:hover ~ .sidebar-overlay,
    .sidebar-overlay:hover {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    /* ── Main Content ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Status Bar ── */
    .status-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: var(--space-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
    }

    .status-dot.warning {
      background: var(--color-warning);
    }

    .status-dot.error {
      background: var(--color-error);
    }

    /* ── Content Area ── */
    .content {
      padding: var(--space-3);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: var(--space-3);
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Panels / Cards ── */
    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .panel:hover {
      border-color: var(--text-tertiary);
      box-shadow: var(--shadow-md);
    }

    .panel-title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* ── Data Display ── */
    .data-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2);
      border-radius: 4px;
      background: var(--bg-primary);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .data-row:hover {
      background: var(--bg-tertiary);
    }

    .data-label {
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
    }

    .data-value {
      color: var(--text-primary);
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
    }

    .data-value.success { color: var(--color-success); }
    .data-value.warning { color: var(--color-warning); }
    .data-value.error { color: var(--color-error); }
    .data-value.info { color: var(--color-info); }

    /* ── Projects Table ── */
    .projects-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .projects-table tr {
      border-bottom: 1px solid var(--border-light);
      transition: background 0.2s;
    }

    .projects-table tr:hover {
      background: var(--bg-primary);
    }

    .projects-table td {
      padding: var(--space-2);
      color: var(--text-primary);
    }

    .projects-table .col-name {
      font-weight: 500;
      min-width: 150px;
    }

    .projects-table .col-branch {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .projects-table .col-status {
      text-align: center;
    }

    .projects-table .col-metrics {
      text-align: right;
      min-width: 100px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .status-badge.online {
      background: rgba(0, 166, 81, 0.15);
      color: var(--color-success);
    }

    .status-badge.offline {
      background: rgba(180, 180, 180, 0.15);
      color: #999999;
    }

    .status-badge.error {
      background: rgba(255, 92, 56, 0.15);
      color: var(--color-error);
    }

    .status-badge.warning {
      background: rgba(255, 140, 58, 0.15);
      color: var(--color-warning);
    }

    /* ── Tooltip System ── */
    .tooltip-trigger {
      cursor: help;
      position: relative;
      border-bottom: 1px dashed var(--border-color);
    }

    .tooltip {
      position: absolute;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1001;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      box-shadow: var(--shadow-md);
    }

    .tooltip-trigger:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    /* ── Heartbeat Animation ── */
    @keyframes heartbeat {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .heartbeat {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
      animation: heartbeat 1.5s infinite;
    }

    .heartbeat.warning {
      background: var(--color-warning);
    }

    .heartbeat.error {
      background: var(--color-error);
    }

    /* ── Quick Action Menu ── */
    .action-menu {
      position: relative;
    }

    .action-btn {
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .action-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .action-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      box-shadow: var(--shadow-lg);
      min-width: 150px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1001;
      margin-top: 4px;
    }

    .action-menu:hover .action-dropdown {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .action-item {
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.2s;
    }

    .action-item:hover {
      background: var(--bg-tertiary);
    }

    .action-item:first-child {
      border-radius: 5px 5px 0 0;
    }

    .action-item:last-child {
      border-radius: 0 0 5px 5px;
    }

    /* ── Sparkline placeholder ── */
    .sparkline {
      width: 40px;
      height: 20px;
      background: linear-gradient(90deg, var(--color-success) 0%, var(--color-warning) 50%, var(--color-error) 100%);
      border-radius: 2px;
      opacity: 0.6;
    }

    /* ── Footer Status Bar ── */
    .footer-bar {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: var(--space-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: var(--space-4);
      color: var(--text-secondary);
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: var(--space-2);
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-tertiary);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }
  </style>
</head>
<body data-theme="light">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"></div>
        <span class="sidebar-title">Kode Keeper</span>
        <button class="sidebar-collapse-btn" id="sidebarToggle" title="Collapse">
          ◀
        </button>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-icon="🏠">Dashboard</button>
        <button class="nav-item" data-icon="📊">Projects</button>
        <button class="nav-item" data-icon="💰">Costs</button>
        <button class="nav-item" data-icon="⚙️">Settings</button>
      </nav>
    </aside>

    <div class="sidebar-overlay"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Status Bar (Top) -->
      <div class="status-bar">
        <div class="status-item">
          <span class="status-dot" id="globalStatus"></span>
          <span id="globalStatusText">Healthy</span>
        </div>
        <div class="status-item">
          <span id="currentTime">--:--</span>
        </div>
      </div>

      <!-- Content Grid -->
      <div class="content" style="flex: 1; overflow-y: auto;">
        <!-- Quick Status Panel -->
        <div class="panel">
          <div class="panel-title">💾 Context & Costs</div>
          <div class="data-row">
            <span class="data-label tooltip-trigger">
              Session Context
              <div class="tooltip" id="ctxTooltip">~42k tokens remaining</div>
            </span>
            <span class="data-value" id="ctxValue">37%</span>
          </div>
          <div class="data-row">
            <span class="data-label tooltip-trigger">
              Today's Cost
              <div class="tooltip">Billed hourly</div>
            </span>
            <span class="data-value" id="dayCost">$--</span>
          </div>
          <div class="data-row">
            <span class="data-label tooltip-trigger">
              This Month
              <div class="tooltip">Month-to-date</div>
            </span>
            <span class="data-value" id="monthCost">$--</span>
          </div>
        </div>

        <!-- Projects Panel -->
        <div class="panel" style="grid-column: span 2;">
          <div class="panel-title">🔌 Projects & Git Status</div>
          <table class="projects-table">
            <thead>
              <tr>
                <td class="col-name">Project</td>
                <td class="col-branch">Branch</td>
                <td class="col-status">Status</td>
                <td class="col-metrics" style="text-align: right;">Bot Metrics</td>
                <td style="text-align: center; width: 32px;">⋮</td>
              </tr>
            </thead>
            <tbody id="projectsList">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>

        <!-- System Status Panel -->
        <div class="panel">
          <div class="panel-title">🖥️ System</div>
          <div class="data-row">
            <span class="data-label">CPU</span>
            <span class="data-value" id="cpuValue">--</span>
          </div>
          <div class="data-row">
            <span class="data-label">RAM</span>
            <span class="data-value" id="ramValue">--</span>
          </div>
          <div class="data-row">
            <span class="data-label">Disk Free</span>
            <span class="data-value" id="diskValue">--</span>
          </div>
        </div>
      </div>

      <!-- Footer Status Bar -->
      <div class="footer-bar">
        <div class="footer-item">
          <span>Updated:</span>
          <span id="lastUpdate" style="font-weight: 500;">--:--</span>
        </div>
        <div class="footer-item">
          <span id="footerStatus">All systems nominal</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/status';
    const POLL_INTERVAL = 6000;

    let sidebarCollapsed = localStorage.getItem('sidebar_collapsed') === 'true';

    // Initialize sidebar state
    function initSidebar() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('sidebarToggle');

      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
      }

      btn.addEventListener('click', () => {
        sidebarCollapsed = !sidebarCollapsed;
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebar_collapsed', sidebarCollapsed);
      });
    }

    // Update clock
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      document.getElementById('currentTime').textContent = time;
    }

    // Fetch and update dashboard
    async function fetchStatus() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        updateDashboard(data);
      } catch (err) {
        console.error('Failed to fetch status:', err);
      }
    }

    function updateDashboard(data) {
      // Update context
      const ctx = data.context || {};
      const ctxPct = Math.round(ctx.pct || 0);
      document.getElementById('ctxValue').textContent = `${ctxPct}%`;

      // Update context tooltip with token estimate (200k token window assumed)
      const tokensRemaining = Math.round(200000 * (1 - ctxPct / 100));
      const ctxTooltip = document.getElementById('ctxTooltip');
      if (ctxTooltip) {
        ctxTooltip.textContent = `~${(tokensRemaining / 1000).toFixed(0)}k tokens remaining`;
      }

      // Update costs
      const usage = data.usage || {};
      document.getElementById('dayCost').textContent = `$${(usage.day?.cost || 0).toFixed(2)}`;
      document.getElementById('monthCost').textContent = `$${(usage.month?.cost || 0).toFixed(2)}`;

      // Update system
      const system = data.system || {};
      document.getElementById('cpuValue').textContent = `${system.cpu_pct || '--'}%`;
      document.getElementById('ramValue').textContent = `${system.ram_pct || '--'}%`;
      document.getElementById('diskValue').textContent = `${system.disk_free || '--'} GB`;

      // Update projects table
      const projects = data.projects || [];
      const tbody = document.getElementById('projectsList');
      tbody.innerHTML = projects.map(p => {
        const isTradingBot = p.name.includes('Kalshi') || p.name.includes('trader');
        const botStatus = p.bot_stats?.status || 'offline';
        const heartbeatClass = botStatus === 'running' ? 'success' : (botStatus === 'paused' ? 'warning' : 'error');
        const statusBadgeClass = p.online ? 'online' : 'offline';

        return `
          <tr>
            <td class="col-name">
              ${isTradingBot ? `<span class="heartbeat ${heartbeatClass}"></span>&nbsp;` : ''}${p.name}
            </td>
            <td class="col-branch">${p.git?.branch || '—'}</td>
            <td class="col-status">
              <span class="status-badge ${statusBadgeClass}">
                ${p.online ? '🟢 Online' : '⚪ Offline'}
              </span>
            </td>
            <td style="text-align: right;">
              ${p.bot_stats ? `
                <span class="status-badge ${p.bot_stats.status === 'running' ? 'online' : 'warning'}">
                  ${p.bot_stats.status}
                </span>
              ` : '—'}
            </td>
            <td style="text-align: center;">
              <div class="action-menu">
                <button class="action-btn" title="More actions">⋮</button>
                <div class="action-dropdown">
                  <button class="action-item" onclick="alert('Clear logs for ${p.name}')">Clear Logs</button>
                  <button class="action-item" onclick="alert('Restart ${p.name}')">Restart</button>
                  <button class="action-item" onclick="alert('View details for ${p.name}')">View Details</button>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      // Update global status
      const hasErrors = projects.some(p => !p.online);
      const statusDot = document.getElementById('globalStatus');
      const statusText = document.getElementById('globalStatusText');
      const footerStatus = document.getElementById('footerStatus');

      if (hasErrors) {
        statusDot.className = 'status-dot error';
        statusText.textContent = 'Warning: Projects offline';
        if (footerStatus) footerStatus.textContent = '⚠️ ' + statusText.textContent;
      } else {
        statusDot.className = 'status-dot';
        statusText.textContent = 'All systems nominal';
        if (footerStatus) footerStatus.textContent = statusText.textContent;
      }

      // Update last update time
      const lastUpdateEl = document.getElementById('lastUpdate');
      if (lastUpdateEl) {
        const now = new Date();
        const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        lastUpdateEl.textContent = time;
      }
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      updateClock();
      fetchStatus();

      setInterval(updateClock, 1000);
      setInterval(fetchStatus, POLL_INTERVAL);
    });
  </script>
</body>
</html>
